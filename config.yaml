llm:
  provider: gemini              # gemini | openrouter | ollama

  gemini:
    api_key: ${GEMINI_API_KEY}
    model: gemini-2.5-pro-latest

  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_key: ${OPENROUTER_API_KEY}
    model: google/gemini-2.5-pro
    site_url: https://mathmotion.local
    site_name: MathMotion

  ollama:
    base_url: http://localhost:11434
    model: gemma3:27b

  max_tokens: 8192
  temperature: 0.2
  max_retries: 3
  timeout_seconds: 120

tts:
  engine: kokoro                # kokoro | vibevoice

  kokoro:
    lang_code: a
    voice: af_heart
    speed: 1.0
    sample_rate: 24000
    available_voices:
      - af_heart
      - af_sky
      - af_bella
      - bm_lewis
      - bm_george

  vibevoice:
    voice: neutral_female
    speed: 1.0
    available_voices:
      - neutral_female
      - neutral_male
      - expressive_female

manim:
  default_quality: standard     # draft | standard | high
  background_color: "#1a1a2e"
  timeout_seconds: 300

composition:
  sync_strategy: time_stretch   # time_stretch | audio_led
  time_stretch_threshold: 0.15
  output_crf: 18
  output_preset: slow

storage:
  jobs_dir: ./jobs

server:
  host: 127.0.0.1
  port: 8000
