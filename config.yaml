llm:
  model: gemini/gemini-2.5-pro   # any litellm model string
  max_tokens: 8192
  temperature: 0.2
  max_retries: 3
  timeout_seconds: 120

tts:
  engine: qwen3                # kokoro | vibevoice | qwen3

  kokoro:
    lang_code: a
    voice: af_heart
    speed: 1.0
    sample_rate: 24000
    available_voices:
      - af_heart
      - af_sky
      - af_bella
      - bm_lewis
      - bm_george

  vibevoice:
    voice: neutral_female
    speed: 1.0
    available_voices:
      - neutral_female
      - neutral_male
      - expressive_female

  qwen3:
    model_id: Qwen/Qwen3-TTS-12Hz-0.6B-CustomVoice
    device: cuda:0
    use_flash_attention: false
    voice: Vivian
    speed: 1.0                    # accepted by interface; ignored in synthesis
    instruct: ""
    language: English
    available_voices:
      - Vivian

manim:
  default_quality: standard     # draft | standard | high
  background_color: "#1a1a2e"
  timeout_seconds: 300

composition:
  output_crf: 18
  output_preset: slow

storage:
  jobs_dir: ./jobs

server:
  host: 127.0.0.1
  port: 8000
