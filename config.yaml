llm:
  model: gemini/gemini-2.0-flash   # Faster model for latency
  models:
    - gemini/gemini-2.0-flash
    - gemini/gemini-2.5-pro
    - ollama/llama3.2
    - ollama/mistral
    - ollama/qwen2.5
    - ollama/gemma3
    - ollama/deepseek-r1
    - fireworks_ai/minimax-m2p5
    - ollama/minimax-m2.7:cloud
    - ollama/kimi-k2.5:cloud
  max_tokens: 16000
  temperature: 0.0
  max_retries: 3
  repair_max_retries: 3
  timeout_seconds: 300

tts:
  engine: kokoro                # kokoro | vibevoice

  kokoro:
    lang_code: a
    voice: af_heart
    speed: 1.0
    sample_rate: 24000
    available_voices:
      - af_heart
      - af_sky
      - af_bella
      - bm_lewis
      - bm_george

  vibevoice:
    model_path: microsoft/VibeVoice-1.5b   # HF model id or local path
    voice: neutral_female
    speed: 1.0
    cfg_scale: 1.3
    ddpm_inference_steps: 10
    device: cuda                            # cuda | mps | cpu
    voice_samples:
      neutral_female: /path/to/voices/neutral_female.wav
      neutral_male:   /path/to/voices/neutral_male.wav
    available_voices:
      - neutral_female
      - neutral_male

manim:
  default_quality: standard     # draft | standard | high
  background_color: "#1a1a2e"
  timeout_seconds: 300

composition:
  output_crf: 18
  output_preset: slow

storage:
  jobs_dir: ./jobs

server:
  host: 127.0.0.1
  port: 8000
